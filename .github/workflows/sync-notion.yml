name: Sync Notion CMS

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

env:
  NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
  NOTION_TEAM_DB_ID: ${{ vars.NOTION_TEAM_DB_ID }}
  NOTION_NEWS_DB_ID: ${{ vars.NOTION_NEWS_DB_ID }}
  NOTION_RESEARCH_DB_ID: ${{ vars.NOTION_RESEARCH_DB_ID }}
  NOTION_SUCCESS_STORIES_DB_ID: ${{ vars.NOTION_SUCCESS_STORIES_DB_ID }}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Notion sync
        run: npx tsx scripts/sync-notion.ts

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/cache/ || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/cache/
          git commit -m "chore: sync Notion CMS data [automated]"
          git push

      - name: Trigger Netlify rebuild
        if: steps.changes.outputs.changed == 'true' && vars.NETLIFY_BUILD_HOOK != ''
        run: curl -X POST -d '{}' "${{ vars.NETLIFY_BUILD_HOOK }}"
